
<!DOCTYPE html>
<html lang="en">
<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>SDG Map Goal 5:Achieve gender equality and empower all women and girls</title>
	
	<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
		.leaflet-container {
			height: 400px;
			width: 600px;
			max-width: 100%;
			max-height: 100%;
		}
	</style>

	<style>#map { width: 1600px; height: 600px; }
.info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; } .info h4 { margin: 0 0 5px; color: #777; }
.legend { text-align: left; line-height: 18px; color: #555; } .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }</style>
<div style="background-color: #fbe4ec; text-align: center; padding: 15px 20px; margin: 10px auto; max-width: 1600px; border-radius: 8px;">
	<h2 style="margin: 0; font-size: 20px; color: #333; background: none; padding: 0;">
		<b>SDG 5</b> Achieve gender equality and empower all women and girls <br><br>
		<b>SDG Target 5.5 Ensure women’s full and effective participation and equal opportunities for leadership at all levels of decision-making in political, economic and public life</b>
	</h2>
</div>
<div id='map'></div>
<script type="text/javascript" src="Data.js"></script>
<script type="text/javascript">

	const map = L.map('map').setView([10, 10], 2);

//UPDATE above - notice the SDG15v3.js file - that is my geometry file - replace that file with your own!
//call the basemap you want to use
	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

	// control that shows attribute info on hover
	const info = L.control();

	info.onAdd = function (map) {
		this._div = L.DomUtil.create('div', 'info');
		this.update();
		return this._div;
	};

		//UPDATE to call your own data for the interactivity- the name after "props" is the attribute name - look in your js file to find the attribute to call
		// change class breaks and color depending on your values //UPDATE for our own legend - use colorbrewer.org for ideas for colors
		//UPDATE legend to match the classes you coded - and the source of your data needs to reference the correct link
	info.update = function (props) {
		const contents = props ? `<b>${props.nam_en}</b><br />${props.SDG_Field} % of women occupying senior and middle management roles relative to all management positions in a country; 2023` : 'Hover over a state';
		this._div.innerHTML = `<h4>5.5.2 proportion of women in managerial positions</h4>${contents}`;
	};

	info.addTo(map);


	
	
	function getColor(d) {
		return d === null || isNaN(d) ? '#bdbdbd' : // 'No Data' :
			d > 45  ? '#980043' :
			d > 36  ? '#dd1c77' :
			d > 31  ? '#df65b0' :
			d > 25   ? '#c994c7' :
			d > 15   ? '#ebd4f0' :
			d > 0   ? '#f1eef6' : '#f7fcf5';
	}

//update the fill color to your variable 
	function style(feature) {
		return {
			weight: 2,
			opacity: 1,
			color: 'gray',
			dashArray: '',
			fillOpacity: 0.7,
			fillColor: getColor(feature.properties.SDG_Field)
		};
	}

	function highlightFeature(e) {
		const layer = e.target;

		layer.setStyle({
			weight: 5,
			color: '#666',
			dashArray: '',
			fillOpacity: 0.7
		});

		layer.bringToFront();

		info.update(layer.feature.properties);
	}

	/* global statesData */ //UPDATE nationData
	const geojson = L.geoJson(nationData, {
		style,
		onEachFeature
	}).addTo(map);

	function resetHighlight(e) {
		geojson.resetStyle(e.target);
		info.update();
	}

	function zoomToFeature(e) {
		map.fitBounds(e.target.getBounds());
	}

	function onEachFeature(feature, layer) {
		layer.on({
			mouseover: highlightFeature,
			mouseout: resetHighlight,
			click: zoomToFeature
		});
	}

	map.attributionControl.addAttribution('SDG data &copy; <a href="https://unstats-undesa.opendata.arcgis.com/">UN SDG DataHub</a>');



	const legend = L.control({position: 'bottomright'});

legend.onAdd = function (map) {
    const div = L.DomUtil.create('div', 'info legend');
    
    const intervals = [
        '0 &ndash; 15%', 
        '15 &ndash; 25%', 
        '25 &ndash; 31%', 
        '31 &ndash; 36%', 
        '36 &ndash; 45%', 
        '45 &ndash; 70.1%'
    ];
    
    const colors = ['#f2f0f5', '#ebd6eb', '#cc99cc', '#df73a4', '#d81b60', '#8b0046'];
    const labels = [];

    for (let i = 0; i < intervals.length; i++) {
        labels.push(`<i style="background:${colors[i]}"></i> ${intervals[i]}`);
    }

    labels.push(`<i style="background:#e0e0e0"></i> No Data`);

    div.innerHTML = labels.join('<br>');
    return div;
};

legend.addTo(map);

</script>
</body>
</html>
